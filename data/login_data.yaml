# 测试数据驱动文件
# 作用：数据与代码分离，方便维护
# saucedemo 电商网站测试数据
# 核心场景：登录、商品加购、结算下单
# 格式说明：每个场景下包含多组用例，支持数据驱动

# 1. 登录场景（核心）
test_login:
  - case_name: 正向用例-标准用户登录
    username: "standard_user"       # saucedemo 官方测试账号
    password: "secret_sauce"        # 通用密码
    expect_result: "登录成功，进入商品列表页"
    expect_url_contains: "inventory.html"
  - case_name: 反向用例-锁定用户登录
    username: "locked_out_user"
    password: "secret_sauce"
    expect_result: "登录失败，提示账号锁定"
    expect_error_msg: "Epic sadface: Sorry, this user has been locked out."
  - case_name: 反向用例-空用户名登录
    username: ""
    password: "secret_sauce"
    expect_result: "登录失败，提示用户名不能为空"
    expect_error_msg: "Epic sadface: Username is required"
  - case_name: 反向用例-空密码登录
    username: "standard_user"
    password: ""
    expect_result: "登录失败，提示密码不能为空"
    expect_error_msg: "Epic sadface: Password is required"
  - case_name: 反向用例-错误账号登录
    username: "standard_user1"
    password: "secret_sauce"
    expect_result: "登录失败，提示"
    expect_error_msg: "Epic sadface: Username and password do not match any user in this service"
  - case_name: 反向用例-错误密码登录
    username: "standard_user"
    password: "123456"
    expect_result: "登录失败，提示"
    expect_error_msg: "Epic sadface: Username and password do not match any user in this service"
# 2. 商品加购场景
test_add_cart:
  - case_name: 正向用例-加购单个商品
    username: "standard_user"
    password: "secret_sauce"
    product_name: "Sauce Labs Backpack"  # 商品名称
    expect_cart_count: 1                 # 购物车数量预期

  - case_name: 正向用例-加购多个不同商品
    username: "standard_user"
    password: "secret_sauce"
    product_names:                       # 多商品列表
      - "Sauce Labs Bike Light"
      - "Sauce Labs Fleece Jacket"
    expect_cart_count: 2

  - case_name: 反向用例-重复加购同一商品
    username: "standard_user"
    password: "secret_sauce"
    product_name: "Sauce Labs T-Shirt"
    add_times: 2                         # 重复加购2次
    expect_cart_count: 1                 # saucedemo 重复加购不叠加数量

# 3. 结算下单场景
test_checkout:
  - case_name: 正向用例-完整信息结算下单
    username: "standard_user"
    password: "secret_sauce"
    first_name: "Test"
    last_name: "User"
    postal_code: "100000"
    expect_result: "下单成功，显示订单完成页"
    expect_url_contains: "checkout-complete.html"

  - case_name: 反向用例-空邮编结算
    username: "standard_user"
    password: "secret_sauce"
    first_name: "Test"
    last_name: "User"
    postal_code: ""
    expect_result: "结算失败，提示邮编不能为空"
    expect_error_msg: "Postal Code is required"

  - case_name: 反向用例-仅填写姓氏结算
    username: "standard_user"
    password: "secret_sauce"
    first_name: ""
    last_name: "User"
    postal_code: "100000"
    expect_result: "结算失败，提示名字不能为空"
    expect_error_msg: "First Name is required"